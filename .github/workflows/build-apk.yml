name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/reactivecircles/android-sdk-image:v36.0.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon --no-parallel

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon --no-parallel

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HJPlan-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HJPlan-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
