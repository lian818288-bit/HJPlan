name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components & accept licenses
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build-debug.log

      - name: Build Release APK
        if: success()
        run: ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee build-release.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build-debug.log
            build-release.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HJPlan-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HJPlan-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
